<!DOCTYPE html>
<html>
<head>
  <title>Ingressy Dashboard</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f7f7f7;
    }
    h1 {
      margin-bottom: 10px;
    }
    .topbar {
      margin-bottom: 20px;
    }
    .card {
      background: white;
      padding: 16px;
      margin-bottom: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
    }
    .row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #eee;
      gap: 16px;
      margin-bottom: 6px;
    }
    .row:last-child {
      border-bottom: none;
    }
    .small {
      color: #666;
      font-size: 12px;
    }
    .muted {
      color: #666;
    }
    a {
      color: #0066cc;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    .button-link {
      background: #0066cc;
      color: white;
      padding: 4px 8px;
      border-radius: 4px;
      text-decoration: none;
      display: inline-block;
    }
    .button-link:hover {
      text-decoration: none;
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <h1>Ingressy Dashboard</h1>
  <p id="current-site" class="small"></p>
  <p class="small">Demo data — not linked to client identity</p>

  <div class="topbar">
    <a href="/onboarding.html">Add your site</a>
  </div>

  <div class="card">
    <h2>Your Sites</h2>
    <div id="sites"></div>
  </div>

  <div class="card">
    <h2>AI Traffic by Source</h2>
    <div id="stats"></div>
  </div>

  <div class="card">
    <h2>Top Pages</h2>
    <div id="pages"></div>
  </div>

  <div class="card">
    <h2>Recent Visits</h2>
    <div id="recent"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const siteId = params.get("siteId");

    const currentSiteEl = document.getElementById("current-site");
    const sitesEl = document.getElementById("sites");
    const statsEl = document.getElementById("stats");
    const pagesEl = document.getElementById("pages");
    const recentEl = document.getElementById("recent");

    if (siteId) {
      currentSiteEl.innerText = `Viewing site: ${siteId}`;
    } else {
      currentSiteEl.innerText = "No site selected";
    }

    fetch("https://api.ingressy.com/sites")
      .then(res => res.json())
      .then(data => {
        if (!data.sites || !data.sites.length) {
          sitesEl.innerHTML = "<p class='muted'>No sites yet.</p>";
          return;
        }

        data.sites.forEach(site => {
          const row = document.createElement("div");
          row.className = "row";
          row.innerHTML = `
            <span><strong>${site.domain}</strong></span>
            <a class="button-link" href="/?siteId=${site.site_id}">Open</a>
          `;

          if (site.site_id === siteId) {
            currentSiteEl.innerText = `Viewing site: ${site.domain}`;
          }

          sitesEl.appendChild(row);
        });
      })
      .catch(() => {
        sitesEl.innerHTML = "<p class='muted'>Failed to load sites.</p>";
      });

    if (!siteId) {
      statsEl.innerHTML = "<p class='muted'>Select a site to view dashboard data.</p>";
      pagesEl.innerHTML = "<p class='muted'>Select a site to view top pages.</p>";
      recentEl.innerHTML = "<p class='muted'>Select a site to view recent visits.</p>";
    } else {
      fetch(`https://api.ingressy.com/dashboard-data?siteId=${siteId}`)
        .then(res => res.json())
        .then(data => {
          console.log(data);

          if (!data.ok) {
            statsEl.innerHTML = "<p class='muted'>Could not load dashboard data.</p>";
            pagesEl.innerHTML = "<p class='muted'>Could not load dashboard data.</p>";
            recentEl.innerHTML = "<p class='muted'>Could not load dashboard data.</p>";
            return;
          }

          if (!data.stats || !data.stats.length) {
            statsEl.innerHTML = "<p class='muted'>No AI traffic yet.</p>";
          } else {
            data.stats.forEach(item => {
              const row = document.createElement("div");
              row.className = "row";
              row.innerHTML = `<span>${item.source}</span><span>${item.count}</span>`;
              statsEl.appendChild(row);
            });
          }

          if (!data.topPages || !data.topPages.length) {
            pagesEl.innerHTML = "<p class='muted'>No pages yet.</p>";
          } else {
            data.topPages.forEach(item => {
              const row = document.createElement("div");
              row.className = "row";
              row.innerHTML = `<span>${item.title || item.path || "(untitled page)"}</span><span>${item.count}</span>`;
              pagesEl.appendChild(row);
            });
          }

          if (!data.recent || !data.recent.length) {
            recentEl.innerHTML = "<p class='muted'>No visits yet.</p>";
          } else {
            data.recent.forEach(item => {
              const row = document.createElement("div");
              row.className = "row";
              row.innerHTML = `
                <div>
                  <strong>${item.source}</strong><br/>
                  <span class="small">${item.path || "/"}</span>
                </div>
                <div class="small">${new Date(item.timestamp).toLocaleString()}</div>
              `;
              recentEl.appendChild(row);
            });
          }
        })
        .catch(error => {
          console.error(error);
          statsEl.innerHTML = "<p class='muted'>Failed to load stats.</p>";
          pagesEl.innerHTML = "<p class='muted'>Failed to load pages.</p>";
          recentEl.innerHTML = "<p class='muted'>Failed to load recent visits.</p>";
        });
    }
  </script>

</body>
</html>
