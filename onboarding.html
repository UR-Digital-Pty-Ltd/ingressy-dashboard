<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ingressy Onboarding</title>
</head>
<body>
  <h1>Add your site</h1>
  <p>Enter your website to generate your install script.</p>

  <form id="site-form">
    <input
      type="url"
      id="website"
      name="website"
      placeholder="https://example.com"
      required
    />
    <button type="submit">Create Site</button>
  </form>

  <div id="result"></div>

<script>
  const form = document.getElementById("site-form");
  const result = document.getElementById("result");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    result.innerHTML = "Creating site...";

    const website = document.getElementById("website").value;

    try {
      const response = await fetch("https://api.ingressy.com/create-site");
const data = await response.json();

await fetch("https://api.ingressy.com/register-site", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    siteId: data.siteId,
    domain: website
  })
});

result.innerHTML = `
  <p>Site created for: ${website}</p>
  <p><strong>Site ID:</strong> ${data.siteId}</p>
  <pre><code>&lt;script async src="https://api.ingressy.com/script.js" data-site-id="${data.siteId}"&gt;&lt;/script&gt;</code></pre>
`;
    } catch (error) {
      result.innerHTML = "Something went wrong. Please try again.";
    }
  });
</script>
</body>
</html>
