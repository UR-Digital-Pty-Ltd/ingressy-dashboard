<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ingressy Onboarding</title>
</head>
<body>
  <h1>Add your site</h1>
  <p>Enter your website to generate your install script.</p>

  <form id="site-form">
    <input
      type="url"
      id="website"
      name="website"
      placeholder="Enter your website (e.g. yoursite.com)"
      required
    />
    <button type="submit">Create Site</button>
  </form>

  <div id="result"></div>

<script>
  const form = document.getElementById("site-form");
  const result = document.getElementById("result");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    result.innerHTML = "Creating site...";

    const website = document.getElementById("website").value;

    try {
      const response = await fetch("https://api.ingressy.com/create-site");
const data = await response.json();

await fetch("https://api.ingressy.com/register-site", {
  method: "POST",
  headers: {
    "Content-Type": "application/json"
  },
  body: JSON.stringify({
    siteId: data.siteId,
    domain: website
  })
});

result.innerHTML = `
  <p>Site created for: ${website}</p>
  <p><strong>Site ID:</strong> ${data.siteId}</p>
  <h2>✅ Installation ready</h2>
  <p>Copy this script and paste it inside your website's &lt;head&gt; tag.</p>
  <pre><code>&lt;script async src="https://api.ingressy.com/script.js" data-site-id="${data.siteId}"&gt;&lt;/script&gt;</code></pre>
  <button id="copy-snippet">Copy Script</button>
  <a href="/?siteId=${data.siteId}">Go to Dashboard →</a>
`;
    } catch (error) {
      result.innerHTML = "Something went wrong. Please try again.";
    }
  });
  document.addEventListener("click", (e) => {
  if (e.target.id === "copy-snippet") {
    const code = document.querySelector("pre code").innerText;
    navigator.clipboard.writeText(code);

    e.target.innerText = "Copied!";
  }
});
</script>
  <p>After installing, send traffic from ChatGPT or add <code>https://your-website.com?utm_source=chatgpt</code> to test.</p>
</body>
</html>
